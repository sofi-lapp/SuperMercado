<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="auth-view" class="view">
        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="username" placeholder="Nombre de usuario">
            <button onclick="app.login()">Entrar</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="main-app" class="view hidden">
        <header>
            <h1 onclick="app.setView('catalog')">Mi Super</h1>
            <div class="nav-actions">
                <span id="user-name"></span>
                <button onclick="app.setView('orders')">Mis Pedidos</button>
                <button onclick="app.toggleCart()">Carrito (<span id="cart-count">0</span>)</button>
                <button onclick="app.logout()">Salir</button>
            </div>
        </header>

        <main id="content-area">
            <!-- Aquí se renderiza el catálogo, pedidos o checkout -->
        </main>
    </div>

    <!-- Sidebar del Carrito -->
    <div id="cart-sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <h3>Tu Carrito</h3>
            <button onclick="app.toggleCart()">Cerrar</button>
        </div>
        <div id="cart-items"></div>
        <div class="sidebar-footer">
            <button id="checkout-btn" onclick="app.setView('checkout')">Finalizar Compra</button>
        </div>
    </div>
    <div id="overlay" class="overlay hidden" onclick="app.toggleCart()"></div>

    <script src="script.js"></script>
</body>
</html>
